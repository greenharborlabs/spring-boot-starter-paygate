services:

  bitcoind:
    image: lncm/bitcoind:v27.0
    restart: unless-stopped
    command:
      - -regtest
      - -server
      - -rpcuser=devuser
      - -rpcpassword=devpass
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -fallbackfee=0.00001
      - -txindex=1
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
    ports:
      - "${BITCOIND_RPC_PORT:-18443}:18443"
    volumes:
      - bitcoind-data:/home/bitcoin/.bitcoin
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=devuser", "-rpcpassword=devpass", "getblockchaininfo"]
      interval: 5s
      timeout: 5s
      retries: 30

  lnd:
    image: lightninglabs/lnd:v0.18.4-beta
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_healthy
    command:
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=devuser
      - --bitcoind.rpcpass=devpass
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      - --noseedbackup
      - --tlsextradomain=lnd
      - --tlsextraip=0.0.0.0
      - --rpclisten=0.0.0.0:10009
      - --restlisten=0.0.0.0:8080
    ports:
      - "${LND_GRPC_PORT:-10009}:10009"
      - "${LND_REST_PORT:-8081}:8080"
    volumes:
      - lnd-data:/root/.lnd
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "getinfo"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  paygate-example-app:
    build:
      context: ..
      dockerfile: paygate-example-app/Dockerfile
    restart: unless-stopped
    depends_on:
      lnd:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "dev"
      L402_ENABLED: "true"
      L402_TEST_MODE: "false"
      L402_SERVICE_NAME: "example-api"
      L402_BACKEND: "lnd"
      L402_ROOT_KEY_STORE: "memory"
      L402_LND_HOST: "lnd"
      L402_LND_PORT: "10009"
      L402_LND_TLS_CERT_PATH: "/lnd/tls.cert"
      L402_LND_MACAROON_PATH: "/lnd/data/chain/bitcoin/regtest/admin.macaroon"
    volumes:
      - lnd-data:/lnd:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  bitcoind-data:
  lnd-data:
