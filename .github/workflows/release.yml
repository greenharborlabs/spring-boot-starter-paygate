name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify release version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -oP '^version=\K.*' gradle.properties)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match gradle.properties version ($GRADLE_VERSION)"
            exit 1
          fi
          if [[ "$GRADLE_VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Cannot release a SNAPSHOT version"
            exit 1
          fi

      - name: Build
        run: ./gradlew build

      - name: Publish to Sonatype and release to Maven Central
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Generate SBOMs
        run: ./gradlew cyclonedxBom
        continue-on-error: true

      - name: Collect SBOM files
        if: success() || failure()
        run: |
          mkdir -p build/sbom-output
          find . -path '*/build/reports/bom.json' -exec sh -c '
            module=$(echo "$1" | sed "s|^\./||;s|/build/reports/bom.json||")
            cp "$1" "build/sbom-output/${module}-sbom.json"
          ' _ {} \;
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/sbom-output/*-sbom.json
