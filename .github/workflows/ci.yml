name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GRADLE_OPTS: "--enable-native-access=ALL-UNNAMED"

jobs:
  agents-md-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
        continue-on-error: true
        id: java25

      - name: Fallback to Java 24 if Java 25 EA unavailable
        if: steps.java25.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Validate AGENTS.md commands
        run: ./scripts/validate-agents-md.sh

  large-file-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect large files (>500KB) and long source files (>1000 lines)
        run: |
          EXIT_CODE=0

          echo "=== Checking for files larger than 500KB ==="
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt 512000 ]; then
              echo "::error file=${file}::File exceeds 500KB limit ($(( size / 1024 ))KB): ${file}"
              EXIT_CODE=1
            fi
          done < <(git ls-files -z)

          echo ""
          echo "=== Checking for source files exceeding 1000 lines ==="
          while IFS= read -r -d '' file; do
            case "$file" in
              *.java|*.kt|*.kts|*.xml|*.yml|*.yaml|*.properties|*.json|*.gradle|*.gradle.kts)
                lines=$(wc -l < "$file")
                if [ "$lines" -gt 1000 ]; then
                  echo "::error file=${file}::Source file exceeds 1000-line limit (${lines} lines): ${file}"
                  EXIT_CODE=1
                fi
                ;;
            esac
          done < <(git ls-files -z)

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All files within size limits."
          fi
          exit $EXIT_CODE

  build:
    needs: [agents-md-validation, large-file-detection]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
        continue-on-error: true
        id: java25

      - name: Fallback to Java 24 if Java 25 EA unavailable
        if: steps.java25.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build
        run: ./gradlew build

      - name: Detect unused dependencies
        run: ./gradlew buildHealth

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/**'
          retention-days: 14

      - name: JaCoCo coverage summary
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: '**/build/reports/jacoco/test/jacocoTestReport.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 80
          title: Coverage Report
          update-comment: true

      - name: Publish test results
        if: github.event_name == 'pull_request' && always()
        uses: dorny/test-reporter@v2
        with:
          name: Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  javadoc:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
        continue-on-error: true
        id: java25

      - name: Fallback to Java 24 if Java 25 EA unavailable
        if: steps.java25.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate aggregate Javadoc
        run: ./gradlew aggregateJavadoc

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: build/docs/javadoc/
          retention-days: 30

  integration-test:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
        continue-on-error: true
        id: java25

      - name: Fallback to Java 24 if Java 25 EA unavailable
        if: steps.java25.outcome == 'failure'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: paygate-integration-tests/go-interop/go.sum

      - name: Prepare Go dependencies
        run: cd paygate-integration-tests/go-interop && go mod tidy

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run integration tests
        run: ./gradlew :paygate-integration-tests:test -Pintegration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: 'paygate-integration-tests/build/test-results/test/*.xml'
          retention-days: 14
